name: Gitea Build OpenWrt SDK + Image Builder

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: '此处填写 release 发行说明:'
        default: '基于 SDK 与 Image Builder 快速打包'
      source_version:
        description: '选择系统版本:'
        required: true
        default: '25.12.2'
        type: choice
        options:
         - 25.12.2
         - snapshots
      device:
        description: '选择目标硬件:'
        required: true
        default: 'x86'
        type: choice
        options:
          - x86
          - GL-MT2500
          - GL-AXT1800
          - nanopi-r2s
      function_type:
        description: '选择固件功能分类:'
        required: true
        default: 'fat'
        type: choice
        options:
          - fat               # 全功能版
          - gateway           # 网关版
          - side-arm-gateway  # 单臂路由版
          - wifi-router       # 普通 wifi 版
          - ap                # AP 版

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Calculate Dynamic Config Directory
        run: |
          VERSION="${{ inputs.source_version }}"
          DEVICE="${{ inputs.device }}"
          FUNC="${{ inputs.function_type }}"
          
          # 1. 提取大版本号
          if [[ "$VERSION" == *"."* ]]; then
            MAJOR_VERSION=$(echo "$VERSION" | cut -d. -f1,2)
          else
            MAJOR_VERSION="$VERSION"
          fi
          
          # 2. 定义路径
          EXACT_DIR="config-files/openwrt-${VERSION}-ib/${DEVICE}/${FUNC}"
          MAJOR_DIR="config-files/openwrt-${MAJOR_VERSION}-ib/${DEVICE}/${FUNC}"
          
          # 3. 智能回退机制
          if [[ -d "${GITHUB_WORKSPACE}/${EXACT_DIR}" ]]; then
            echo "✅ 找到精确匹配的配置目录: $EXACT_DIR"
            echo "BASE_CONF_DIR=$EXACT_DIR" >> $GITHUB_ENV
            CONF_DIR="${GITHUB_WORKSPACE}/${EXACT_DIR}"
          elif [[ -d "${GITHUB_WORKSPACE}/${MAJOR_DIR}" ]]; then
            echo "✅ 找到大版本通用配置目录: $MAJOR_DIR"
            echo "BASE_CONF_DIR=$MAJOR_DIR" >> $GITHUB_ENV
            CONF_DIR="${GITHUB_WORKSPACE}/${MAJOR_DIR}"
          else
            echo "⚠️ 警告: 未找到专属目录，将默认指向: $MAJOR_DIR"
            echo "BASE_CONF_DIR=$MAJOR_DIR" >> $GITHUB_ENV
            CONF_DIR="${GITHUB_WORKSPACE}/${MAJOR_DIR}"
          fi
          
          # 4. 计算 packages.txt 哈希值用于严格判定 Image Builder 缓存
          if [[ -f "${CONF_DIR}/packages.txt" ]]; then
              echo "PKGS_HASH=$(sha256sum "${CONF_DIR}/packages.txt" | awk '{print $1}')" >> $GITHUB_ENV
          else
              echo "PKGS_HASH=none" >> $GITHUB_ENV
          fi


      - name: Check Server Performance
        run: |
          echo "--------------------------CPU与内存信息--------------------------"
          echo "CPU核心数量: $(nproc)"
          echo "CPU型号信息: $(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"
          echo "已安装内存: $(sudo lshw -short -C memory | grep GiB | head -n 1)"

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Create simulated physical disk (/builder)
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder

      - name: Dynamic Architecture & Download URLs Parser
        id: vars
        run: |
          # 1. 识别源站 URL
          if [[ "${{ inputs.source_version }}" == "snapshots" ]]; then
              BASE_URL="https://downloads.openwrt.org/snapshots/targets"
          else
              BASE_URL="https://downloads.openwrt.org/releases/${{ inputs.source_version }}/targets"
          fi

          # 2. 架构映射
          if [[ "${{ inputs.device }}" == "x86" ]]; then
              TARGET_PATH="x86/64"
              PROFILE="generic"
              RUST_TARGET="x86_64-unknown-linux-musl"
              RUST_LINKER_BIN="x86_64-openwrt-linux-musl-gcc"
          elif [[ "${{ inputs.device }}" == "GL-MT2500" ]]; then
              TARGET_PATH="mediatek/filogic"
              PROFILE="glinet_gl-mt2500"
              RUST_TARGET="aarch64-unknown-linux-musl"
              RUST_LINKER_BIN="aarch64-openwrt-linux-musl-gcc"
          elif [[ "${{ inputs.device }}" == "GL-AXT1800" ]]; then
              TARGET_PATH="qualcommax/ipq60xx"
              PROFILE="glinet_gl-axt1800"
              RUST_TARGET="aarch64-unknown-linux-musl"
              RUST_LINKER_BIN="aarch64-openwrt-linux-musl-gcc"
          elif [[ "${{ inputs.device }}" == "nanopi-r2s" ]]; then
              TARGET_PATH="rockchip/armv8"
              PROFILE="friendlyarm_nanopi-r2s"
              RUST_TARGET="aarch64-unknown-linux-musl"
              RUST_LINKER_BIN="aarch64-openwrt-linux-musl-gcc"
          fi

          TARGET_URL="${BASE_URL}/${TARGET_PATH}"
          
          # 3. 智能抓取 sha256sums 提取精确文件名
          SDK_FILE=$(curl -sL "${TARGET_URL}/sha256sums" | grep "openwrt-sdk" | grep "tar.zst" | awk '{print $2}' | sed 's/*//g' | head -n 1)
          IB_FILE=$(curl -sL "${TARGET_URL}/sha256sums" | grep "openwrt-imagebuilder" | grep "tar.zst" | awk '{print $2}' | sed 's/*//g' | head -n 1)

          # 4. 导出变量
          echo "SDK_URL=${TARGET_URL}/${SDK_FILE}" >> $GITHUB_ENV
          echo "IB_URL=${TARGET_URL}/${IB_FILE}" >> $GITHUB_ENV
          echo "SDK_FILE=${SDK_FILE}" >> $GITHUB_ENV
          echo "IB_FILE=${IB_FILE}" >> $GITHUB_ENV
          echo "PROFILE=${PROFILE}" >> $GITHUB_ENV
          echo "RUST_TARGET=${RUST_TARGET}" >> $GITHUB_ENV
          echo "RUST_LINKER_BIN=${RUST_LINKER_BIN}" >> $GITHUB_ENV


      - name: Install Environment, Latest Go & Rust
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y build-essential asciidoc ack antlr3 autoconf automake autopoint binutils bison bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd aria2 musl-tools clang llvm lld 
          
          # 仅在需要编译（非 gateway 模式）时安装 Go 和 Rust，节省时间
          if [[ "${{ inputs.function_type }}" != "gateway" ]]; then
            # 1. 动态抓取并安装最新稳定版 Go
            sudo apt-get purge -y golang-go && sudo apt-get autoremove -y
            LATEST_GO=$(curl -sL https://go.dev/VERSION?m=text | head -n 1)
            echo "发现最新 Go 版本: $LATEST_GO，准备安装..."
            aria2c -x 16 -s 16 "https://go.dev/dl/${LATEST_GO}.linux-amd64.tar.gz"
            sudo rm -rf /usr/local/go
            sudo tar -C /usr/local -xzf "${LATEST_GO}.linux-amd64.tar.gz"
            echo "/usr/local/go/bin" >> $GITHUB_PATH

            # 2. 更新 Rust / Cargo 环境
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
            rustup update
            rustup target add ${{ env.RUST_TARGET }}
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          else
            echo "👉 当前为 gateway 模式，仅需 Image Builder 基础打包环境，跳过 Go 和 Rust 安装。"
          fi

      - name: Cache Downloaded Archives (SDK & IB)
        uses: actions/cache@v4
        with:
          path: /builder/downloads
          key: ${{ runner.os }}-archives-${{ env.SDK_FILE }}-${{ env.IB_FILE }}

      - name: Download SDK & Image Builder
        run: |
          mkdir -p /builder/downloads
          cd /builder/downloads
          
          if [[ "${{ inputs.function_type }}" != "gateway" ]]; then
            if [[ ! -f "${{ env.SDK_FILE }}" ]]; then
                echo "未命中缓存，下载 SDK..."
                aria2c -x 16 -s 16 "${{ env.SDK_URL }}"
            else
                echo "✅ 命中缓存，跳过 SDK 下载!"
            fi
          else
            echo "👉 当前为 gateway 模式，跳过 SDK 下载!"
          fi
          
          if [[ ! -f "${{ env.IB_FILE }}" ]]; then
              echo "未命中缓存，下载 Image Builder..."
              aria2c -x 16 -s 16 "${{ env.IB_URL }}"
          else
              echo "✅ 命中缓存，跳过 IB 下载!"
          fi

      - name: Extract OpenWrt SDK
        if: inputs.function_type != 'gateway'
        working-directory: /builder
        run: |
          tar --zstd -xf /builder/downloads/${{ env.SDK_FILE }}
          mv openwrt-sdk-* openwrt-sdk

      # ----------- Rust/Cargo 注册表与索引加速 -----------
      - name: Cache Rust & Cargo Registry
        if: inputs.function_type != 'gateway'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ inputs.source_version }}-${{ inputs.device }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ inputs.source_version }}-

      # ----------- 强化 SDK 依赖源码 dl 缓存机制 -----------
      - name: Cache SDK dl directory
        if: inputs.function_type != 'gateway'
        uses: actions/cache@v4
        with:
          path: /builder/openwrt-sdk/dl
          key: ${{ runner.os }}-sdk-dl-${{ inputs.source_version }}-${{ inputs.device }}
          restore-keys: |
            ${{ runner.os }}-sdk-dl-${{ inputs.source_version }}-

      # ----------- 缓存 SDK 编译生成的 C/C++ 中间产物 -----------
      - name: Cache SDK Build Intermediates
        if: inputs.function_type != 'gateway'
        uses: actions/cache@v4
        with:
          path: |
            /builder/openwrt-sdk/build_dir/target-*
            /builder/openwrt-sdk/staging_dir/target-*
          key: ${{ runner.os }}-sdk-build-${{ inputs.source_version }}-${{ inputs.device }}
          restore-keys: |
            ${{ runner.os }}-sdk-build-${{ inputs.source_version }}-

      - name: Clone custom plugins source (in SDK)
        if: inputs.function_type != 'gateway'
        working-directory: /builder/openwrt-sdk
        run: |
          # 建立软链接 UPX
          mkdir -p staging_dir/host/bin/
          ln -sf /usr/bin/upx staging_dir/host/bin/upx

          # 下载第三方插件源码
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall.git ./package/luci-app-passwall
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall2.git ./package/luci-app-passwall2
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git ./package/passwall-depends
          git clone --branch dev --depth=1 https://github.com/vernesong/OpenClash.git ./package/luci-app-openclash
          git clone https://github.com/immortalwrt/homeproxy.git ./package/luci-app-homeproxy
          
          # vlmcsd 处理
          git clone https://github.com/immortalwrt/packages.git ../temp-packages
          git clone https://github.com/immortalwrt/luci.git ../temp-luci
          cp -R ../temp-packages/net/vlmcsd ./package/vlmcsd
          cp -R ../temp-luci/applications/luci-app-vlmcsd ./package/luci-app-vlmcsd
          sed -i 's|\.\./\.\./luci\.mk|$(TOPDIR)/feeds/luci/luci.mk|g' package/luci-app-vlmcsd/Makefile
          rm -rf ../temp-packages ../temp-luci

      - name: Update Feeds & Replace Go (in SDK)
        if: inputs.function_type != 'gateway'
        working-directory: /builder/openwrt-sdk
        run: |
          ./scripts/feeds update -a
          
          # 替换官方仓库的 Go
          git clone https://github.com/openwrt/packages.git ../temp-packages
          rm -rf ./feeds/packages/lang/golang
          cp -R ../temp-packages/lang/golang ./feeds/packages/lang/golang
          rm -rf ../temp-packages

          # 安装依赖
          ./scripts/feeds install boost libpcre2 libev libsodium libmbedtls libudns coreutils curl ca-bundle dnsmasq-full
          ./scripts/feeds install luci-i18n-base-zh-cn luci-app-homeproxy luci-app-openclash luci-app-passwall luci-app-passwall2  luci-app-vlmcsd vlmcsd
          ./scripts/feeds install luci-i18n-passwall-zh-cn luci-i18n-passwall2-zh-cn luci-i18n-homeproxy-zh-cn luci-i18n-vlmcsd-zh-cn

      - name: Compile Host Tools (jsmin & po2lmo)
        if: inputs.function_type != 'gateway'
        working-directory: /builder/openwrt-sdk
        run: |
          # 记录当前 SDK 的绝对路径
          SDK_ROOT=$(pwd)

          # 确保 host/bin 目录存在
          mkdir -p $SDK_ROOT/staging_dir/host/bin/

          # 进入 src 目录编译
          cd feeds/luci/modules/luci-base/src

          # 编译并复制 jsmin
          gcc -o jsmin jsmin.c
          cp jsmin $SDK_ROOT/staging_dir/host/bin/
          chmod +x $SDK_ROOT/staging_dir/host/bin/jsmin
          
          # 编译并复制 po2lmo (均在同一 src 目录下完成)
          gcc -o contrib/lemon contrib/lemon.c
          ./contrib/lemon -q lib/plural_formula.y
          gcc -o po2lmo po2lmo.c lib/lmo.c lib/plural_formula.c
          cp po2lmo $SDK_ROOT/staging_dir/host/bin/
          chmod +x $SDK_ROOT/staging_dir/host/bin/po2lmo

      - name: Configure, Patch & Pre-compile (Boost/pcre2)
        if: inputs.function_type != 'gateway'
        working-directory: /builder/openwrt-sdk
        run: |
          # 导入不同分类专属的 config 文件
          if [[ -f "${GITHUB_WORKSPACE}/${BASE_CONF_DIR}/config" ]]; then
             cp "${GITHUB_WORKSPACE}/${BASE_CONF_DIR}/config" .config
          else
             echo "警告: 未找到专属 config，将使用 defconfig"
             make defconfig
          fi

          # 放宽 download 超时
          sed -i 's/--connect-timeout 5/--connect-timeout 30/g' scripts/download.pl

          # 预下载并清理损坏文件
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          make download -j1 V=s

          # 提前编译核心依赖库
          make package/pcre2/compile V=s -j$(nproc) || true
          make package/boost/compile V=s -j$(nproc) || true

      - name: Export Dynamic Rust Linker Variables
        if: inputs.function_type != 'gateway'
        run: |
          # 动态注入工具链至环境变量
          TOOLCHAIN_BIN_DIR=$(ls -d /builder/openwrt-sdk/staging_dir/toolchain-*/bin | head -n 1)
          echo "$TOOLCHAIN_BIN_DIR" >> $GITHUB_PATH
          # 构建大写的 Rust 链接器环境变量名 (如: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER)
          RUST_LINKER_VAR="CARGO_TARGET_$(echo ${{ env.RUST_TARGET }} | tr 'a-z-' 'A-Z_')_LINKER"
          echo "${RUST_LINKER_VAR}=${{ env.RUST_LINKER_BIN }}" >> $GITHUB_ENV

      - name: Compile Custom Packages (in SDK)
        if: inputs.function_type != 'gateway'
        working-directory: /builder/openwrt-sdk
        run: |
          make package/luci-app-passwall/compile -j$(nproc) || make package/luci-app-passwall/compile -j1 V=s
          make package/luci-app-passwall2/compile -j$(nproc) || make package/luci-app-passwall2/compile -j1 V=s
          make package/luci-app-homeproxy/compile -j$(nproc) || make package/luci-app-homeproxy/compile -j1 V=s
          make package/luci-app-openclash/compile -j$(nproc) || make package/luci-app-openclash/compile -j1 V=s
          make package/vlmcsd/compile -j$(nproc) || make package/vlmcsd/compile -j1 V=s
          make package/luci-app-vlmcsd/compile -j$(nproc) || make package/luci-app-vlmcsd/compile -j1 V=s

      - name: Extract Image Builder
        working-directory: /builder
        run: |
          tar --zstd -xf /builder/downloads/${{ env.IB_FILE }}
          mv openwrt-imagebuilder-* openwrt-imagebuilder

      # ----------- 基于文件哈希的终极隔离 Image Builder 缓存 -----------
      - name: Cache Image Builder dl directory
        uses: actions/cache@v4
        with:
          path: /builder/openwrt-imagebuilder/dl
          key: ${{ runner.os }}-ib-dl-${{ inputs.source_version }}-${{ inputs.device }}-${{ inputs.function_type }}-${{ env.PKGS_HASH }}
          restore-keys: |
            ${{ runner.os }}-ib-dl-${{ inputs.source_version }}-${{ inputs.device }}-${{ inputs.function_type }}-
            ${{ runner.os }}-ib-dl-${{ inputs.source_version }}-${{ inputs.device }}-

      - name: Transfer SDK Packages & Prepare IB configs
        run: |
          # 建立接收文件夹
          mkdir -p /builder/openwrt-imagebuilder/packages

          # 仅在非 gateway 模式，且存在 SDK 编译目录的情况下进行本地包转移
          if [[ "${{ inputs.function_type }}" != "gateway" && -d "/builder/openwrt-sdk/bin" ]]; then
              echo "将 SDK 编译出的软件包转移给 Image Builder..."
              mkdir -p /builder/openwrt-sdk/bin/packages/
              mkdir -p /builder/openwrt-sdk/bin/targets/
              find /builder/openwrt-sdk/bin/packages/ -name "*.apk" -exec mv {} /builder/openwrt-imagebuilder/packages/ \; || true
              find /builder/openwrt-sdk/bin/targets/ -name "*.apk" -exec mv {} /builder/openwrt-imagebuilder/packages/ \; || true
          else
              echo "👉 当前为 gateway 模式，直接使用官方源软件，无需转移本地编译包。"
          fi

          cd /builder/openwrt-imagebuilder
          # 注入 99-custom-settings
          mkdir -p files/etc/uci-defaults
          if [[ -f "${GITHUB_WORKSPACE}/${BASE_CONF_DIR}/99-custom-settings" ]]; then
              cp "${GITHUB_WORKSPACE}/${BASE_CONF_DIR}/99-custom-settings" files/etc/uci-defaults/99-custom-settings
              chmod +x files/etc/uci-defaults/99-custom-settings
          fi

          # 提取指定功能专属的 packages.txt 清单为一行变量
          if [[ -f "${GITHUB_WORKSPACE}/${BASE_CONF_DIR}/packages.txt" ]]; then
              PACKAGES_LIST=$(cat "${GITHUB_WORKSPACE}/${BASE_CONF_DIR}/packages.txt" | tr '\n' ' ' | sed 's/\r//g')
              echo "PACKAGES_LIST=${PACKAGES_LIST}" >> $GITHUB_ENV
          else
              echo "致命错误: 未在 ${BASE_CONF_DIR} 目录下找到 packages.txt 清单文件!"
              exit 1
          fi

          # 仅针对支持动态扩容的架构修改 Rootfs 分区大小
          if [[ "${{ inputs.device }}" == "x86" || "${{ inputs.device }}" == "nanopi-r2s" ]]; then
              echo "当前架构支持 Rootfs 扩容，正在修改分区大小..."
              grep -q "CONFIG_TARGET_ROOTFS_PARTSIZE" .config && sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=[0-9]*/CONFIG_TARGET_ROOTFS_PARTSIZE=2048/' .config || echo "CONFIG_TARGET_ROOTFS_PARTSIZE=2048" >> .config
          else
              echo "当前架构 (${{ inputs.device }}) 使用固定闪存映射，跳过 Rootfs 扩容步骤以防变砖。"
          fi

      - name: Build Firmware (Image Builder)
        working-directory: /builder/openwrt-imagebuilder
        run: |
          # 执行终极打包命令，注入读取好的 packages
          make image PROFILE="${{ env.PROFILE }}" FILES="files" PACKAGES="${{ env.PACKAGES_LIST }}"

      - name: Convert to QCOW2 for PVE (x86 Only)
        if: inputs.device == 'x86'
        working-directory: /builder/openwrt-imagebuilder/bin/targets/x86/64
        run: |
          # 提取打包出来的 squashfs-combined.img.gz（安全容错）
          IMG_GZ_FILE=$(ls *squashfs-combined.img.gz | head -n 1)
          if [[ -n "$IMG_GZ_FILE" ]]; then
              echo "发现 $IMG_GZ_FILE ，正在转换 QCOW2 ..."
              cp "$IMG_GZ_FILE" openwrt.img.gz
              gzip -d openwrt.img.gz
              qemu-img convert -f raw -O qcow2 openwrt.img openwrt.qcow2
              cp openwrt.qcow2 openwrt.qcow2.iso
              rm -rf openwrt.img
              echo "转换完成！"
          else
              echo "警告: 未找到 *squashfs-combined.img.gz，跳过转换步骤"
          fi

      - name: Organize Artifacts
        id: organize
        run: |
          cd /builder/openwrt-imagebuilder/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Generate release tag
        id: tag
        run: |
          TAG_NAME="OpenWrt-${{ inputs.source_version }}-${{ inputs.device }}-${{ inputs.function_type }}-$(date +"%Y%m%d%H%M")"
          echo "release_tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          
          touch release_notes.txt
          echo "## $TAG_NAME" >> release_notes.txt
          echo "${{ github.event.inputs.release_notes }}" >> release_notes.txt
          echo "- **架构平台**: ${{ inputs.device }}" >> release_notes.txt
          echo "- **系统版本**: ${{ inputs.source_version }}" >> release_notes.txt
          echo "- **功能分类**: ${{ inputs.function_type }}" >> release_notes.txt

      - name: Upload firmware to GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release_notes.txt
          files: ${{ env.FIRMWARE }}/*
          token: ${{ secrets.GITHUB_TOKEN }}