name: Gitea Build OpenWrt Source Code

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

      - name: 自定义软件源结果检查
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo sed -i 's|http://archive.ubuntu.com/ubuntu/|https://nexus.yra.cc/repository/ubuntu-noble-proxy|; s|http://security.ubuntu.com/ubuntu/|https://nexus.yra.cc/repository/ubuntu-noble-security-proxy|' /etc/apt/sources.list.d/ubuntu.sources

          echo '检查自定义软件源的结果:'
          echo '/etc/apt/sources.list里的内容:'
          cat /etc/apt/sources.list || true

          echo '软件源是DEB822 格式吗?'
          ls -lhR /etc/apt/sources.list.d/ || true

          echo '如果软件源是DEB822 格式,尝试展示ubuntu.sources内容:'
          cat /etc/apt/sources.list.d/ubuntu.sources || true

          echo '检查网络是否畅通'

          curl git.openwrt.org || true

          echo '展示git-core-ubuntu-ppa-noble.sources内容'

          cat /etc/apt/sources.list.d/git-core-ubuntu-ppa-noble.sources || true

          echo '展示github_git-lfs.list内容'

          cat /etc/apt/sources.list.d/github_git-lfs.list || true

          echo '展示microsoft-prod.list内容'

          cat /etc/apt/sources.list.d/microsoft-prod.list || true

